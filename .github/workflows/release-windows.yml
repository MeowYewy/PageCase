name: Release Windows (PDF Studio for Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.11.1 MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'win64_mingw'
          modules: 'qtquickcontrols2 qtnetwork qtconcurrent'
          tools: 'tools_mingw1310'

      - name: Build Release
        shell: cmd
        run: scripts\build-release.bat

      - name: Deploy (windeployqt + tools)
        shell: cmd
        run: scripts\deploy.bat

      - name: Package portable ZIP
        shell: cmd
        run: scripts\package-portable.bat

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfstudio-windows-${{ github.ref_name }}
          path: |
            dist/artifacts/*.zip
            dist/PDF_Studio_*_win64/

      - name: Attach portable ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/artifacts/*.zip
          allow_updates: true
          overwrite_files: true
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
